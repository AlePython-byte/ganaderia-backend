spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

jwt.secret=clave-super-segura-de-prueba-12345678901234567890
jwt.expiration-ms=86400000

device.auth.secret-master-key=clave-maestra-dispositivos-prueba-12345678901234567890

app.bootstrap.admin.name=
app.bootstrap.admin.email=
app.bootstrap.admin.password=

app.cors.allowed-origins=http://localhost:5173

app.pagination.default-size=20
app.pagination.max-size=100

management.endpoints.web.base-path=/actuator
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.probes.enabled=true
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true
management.endpoint.health.show-details=never
management.endpoint.health.show-components=always

management.endpoint.metrics.access=read_only
management.endpoint.prometheus.access=read_only
management.prometheus.metrics.export.enabled=true

management.metrics.tags.application=ganaderia4backend
management.metrics.distribution.percentiles-histogram.http.server.requests=true

springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true

app.device-monitor.offline-threshold-minutes=15
app.device-monitor.offline-check-ms=60000

spring.task.scheduling.enabled=false
