spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jackson.time-zone=UTC
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.open-in-view=false

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

jwt.secret=clave-super-segura-de-prueba-12345678901234567890
jwt.expiration-ms=86400000
app.auth.password-reset.token-ttl=15m
app.frontend.password-reset-url=http://localhost:5173/reset-password

device.auth.secret-master-key=clave-maestra-dispositivos-prueba-12345678901234567890

app.bootstrap.admin.enabled=false
app.bootstrap.admin.name=
app.bootstrap.admin.email=
app.bootstrap.admin.password=
app.bootstrap.admin.update-existing=false
app.bootstrap.admin.reset-password=false

app.cors.allowed-origins=http://localhost:5173

app.pagination.default-size=20
app.pagination.max-size=100

app.notifications.webhook.enabled=false
app.notifications.webhook.url=
app.notifications.webhook.connect-timeout=5s
app.notifications.webhook.read-timeout=5s
app.notifications.webhook.secret=
app.notifications.webhook.processor-enabled=false
app.notifications.webhook.processor-fixed-delay=15s
app.notifications.webhook.processor-batch-size=20
app.notifications.webhook.max-attempts=3
app.notifications.webhook.retry-backoff=30s

app.abuse-protection.enabled=true
app.abuse-protection.cleanup.enabled=false
app.abuse-protection.client-ip.trust-forwarded-headers=false
app.abuse-protection.login.enabled=true
app.abuse-protection.login.window=15m
app.abuse-protection.login.max-attempts=5
app.abuse-protection.login.block-duration=15m
app.abuse-protection.device.enabled=true
app.abuse-protection.device.window=1m
app.abuse-protection.device.max-attempts=300
app.abuse-protection.device.block-duration=5m

app.ai.enabled=false
app.ai.provider=gemini
app.ai.gemini-api-key=
app.ai.gemini-model=gemini-2.5-flash
app.ai.gemini-base-url=https://generativelanguage.googleapis.com/v1beta/models
app.ai.gemini-connect-timeout=5s
app.ai.gemini-read-timeout=10s

management.endpoints.web.base-path=/actuator
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.probes.enabled=true
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true
management.endpoint.health.show-details=never
management.endpoint.health.show-components=always

management.endpoint.metrics.access=read_only
management.endpoint.prometheus.access=read_only
management.prometheus.metrics.export.enabled=true

management.metrics.tags.application=ganaderia4backend
management.metrics.distribution.percentiles-histogram.http.server.requests=true

springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true

app.device-monitor.offline-threshold-minutes=15
app.device-monitor.offline-check-ms=60000

spring.task.scheduling.enabled=false
app.device-replay-nonce-cleanup.enabled=false
