spring.application.name=ganaderia4backend

server.port=${PORT:10000}

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/ganaderia4}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

jwt.secret=${JWT_SECRET:cambia-esta-clave-super-larga-y-segura-1234567890}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

app.bootstrap.admin.name=${APP_BOOTSTRAP_ADMIN_NAME:}
app.bootstrap.admin.email=${APP_BOOTSTRAP_ADMIN_EMAIL:}
app.bootstrap.admin.password=${APP_BOOTSTRAP_ADMIN_PASSWORD:}