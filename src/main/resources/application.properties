spring.application.name=ganaderia4backend

server.port=${SERVER_PORT:${PORT:8080}}

spring.profiles.default=${SPRING_PROFILES_DEFAULT:local}

spring.jackson.time-zone=UTC
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.open-in-view=false

jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

device.auth.window-seconds=${DEVICE_AUTH_WINDOW_SECONDS:300}
device.auth.hmac-pepper=${DEVICE_HMAC_PEPPER:}
device.auth.secret-master-key=${DEVICE_SECRET_MASTER_KEY:}
app.device-replay-nonce-cleanup.enabled=${APP_DEVICE_REPLAY_NONCE_CLEANUP_ENABLED:true}
app.device-replay-nonce-cleanup.fixed-delay=${APP_DEVICE_REPLAY_NONCE_CLEANUP_FIXED_DELAY:10m}
app.device-replay-nonce-cleanup.retention=${APP_DEVICE_REPLAY_NONCE_CLEANUP_RETENTION:30m}

reports.alerts.csv-max-rows=${REPORT_ALERTS_CSV_MAX_ROWS:5000}

app.pagination.default-size=${APP_PAGINATION_DEFAULT_SIZE:20}
app.pagination.max-size=${APP_PAGINATION_MAX_SIZE:100}
app.bootstrap.admin.enabled=${APP_BOOTSTRAP_ADMIN_ENABLED:true}
app.bootstrap.admin.name=${APP_BOOTSTRAP_ADMIN_NAME:}
app.bootstrap.admin.email=${APP_BOOTSTRAP_ADMIN_EMAIL:}
app.bootstrap.admin.password=${APP_BOOTSTRAP_ADMIN_PASSWORD:}
app.bootstrap.admin.update-existing=${APP_BOOTSTRAP_ADMIN_UPDATE_EXISTING:false}
app.bootstrap.admin.reset-password=${APP_BOOTSTRAP_ADMIN_RESET_PASSWORD:false}

app.notifications.webhook.enabled=${APP_NOTIFICATIONS_WEBHOOK_ENABLED:false}
app.notifications.webhook.url=${APP_NOTIFICATIONS_WEBHOOK_URL:}
app.notifications.webhook.connect-timeout=${APP_NOTIFICATIONS_WEBHOOK_CONNECT_TIMEOUT:5s}
app.notifications.webhook.read-timeout=${APP_NOTIFICATIONS_WEBHOOK_READ_TIMEOUT:5s}
app.notifications.webhook.secret=${APP_NOTIFICATIONS_WEBHOOK_SECRET:}
app.notifications.webhook.processor-enabled=${APP_NOTIFICATIONS_WEBHOOK_PROCESSOR_ENABLED:true}
app.notifications.webhook.processor-fixed-delay=${APP_NOTIFICATIONS_WEBHOOK_PROCESSOR_FIXED_DELAY:15s}
app.notifications.webhook.processor-batch-size=${APP_NOTIFICATIONS_WEBHOOK_PROCESSOR_BATCH_SIZE:20}
app.notifications.webhook.max-attempts=${APP_NOTIFICATIONS_WEBHOOK_MAX_ATTEMPTS:3}
app.notifications.webhook.retry-backoff=${APP_NOTIFICATIONS_WEBHOOK_RETRY_BACKOFF:30s}
app.notifications.email.enabled=${APP_NOTIFICATIONS_EMAIL_ENABLED:false}
app.notifications.email.provider=${APP_NOTIFICATIONS_EMAIL_PROVIDER:resend}
app.notifications.email.api-key=${APP_NOTIFICATIONS_EMAIL_API_KEY:}
app.notifications.email.from=${APP_NOTIFICATIONS_EMAIL_FROM:}
app.notifications.email.to=${APP_NOTIFICATIONS_EMAIL_TO:}
app.notifications.email.connect-timeout-ms=${APP_NOTIFICATIONS_EMAIL_CONNECT_TIMEOUT_MS:3000}
app.notifications.email.read-timeout-ms=${APP_NOTIFICATIONS_EMAIL_READ_TIMEOUT_MS:5000}
app.notifications.email.base-url=${APP_NOTIFICATIONS_EMAIL_BASE_URL:https://api.resend.com}

app.abuse-protection.enabled=${APP_ABUSE_PROTECTION_ENABLED:true}
app.abuse-protection.cleanup.enabled=${APP_ABUSE_PROTECTION_CLEANUP_ENABLED:true}
app.abuse-protection.cleanup.fixed-delay=${APP_ABUSE_PROTECTION_CLEANUP_FIXED_DELAY:30m}
app.abuse-protection.cleanup.retention=${APP_ABUSE_PROTECTION_CLEANUP_RETENTION:24h}
app.abuse-protection.client-ip.trust-forwarded-headers=${APP_ABUSE_PROTECTION_TRUST_FORWARDED_HEADERS:false}
app.abuse-protection.login.enabled=${APP_ABUSE_PROTECTION_LOGIN_ENABLED:true}
app.abuse-protection.login.window=${APP_ABUSE_PROTECTION_LOGIN_WINDOW:15m}
app.abuse-protection.login.max-attempts=${APP_ABUSE_PROTECTION_LOGIN_MAX_ATTEMPTS:5}
app.abuse-protection.login.block-duration=${APP_ABUSE_PROTECTION_LOGIN_BLOCK_DURATION:15m}
app.abuse-protection.device.enabled=${APP_ABUSE_PROTECTION_DEVICE_ENABLED:true}
app.abuse-protection.device.window=${APP_ABUSE_PROTECTION_DEVICE_WINDOW:1m}
app.abuse-protection.device.max-attempts=${APP_ABUSE_PROTECTION_DEVICE_MAX_ATTEMPTS:300}
app.abuse-protection.device.block-duration=${APP_ABUSE_PROTECTION_DEVICE_BLOCK_DURATION:5m}

app.ai.enabled=${AI_ENABLED:false}
app.ai.provider=${AI_PROVIDER:gemini}
app.ai.gemini-api-key=${GEMINI_API_KEY:}
app.ai.gemini-model=${GEMINI_MODEL:gemini-2.5-flash}
app.ai.gemini-base-url=${GEMINI_BASE_URL:https://generativelanguage.googleapis.com/v1beta/models}
app.ai.gemini-connect-timeout=${GEMINI_CONNECT_TIMEOUT:5s}
app.ai.gemini-read-timeout=${GEMINI_READ_TIMEOUT:10s}

management.endpoints.web.base-path=/actuator
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.probes.enabled=true
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true
management.endpoint.health.show-details=never
management.endpoint.health.show-components=always

info.app.name=Ganaderia 4.0 Backend
info.app.description=Backend del sistema de monitoreo ganadero con geocercas y alertas
info.app.version=0.0.1-SNAPSHOT

logging.pattern.level=%5p [req:%X{requestId:-N/A}]
logging.level.org.hibernate.SQL=${APP_SQL_LOG_LEVEL:OFF}
logging.level.org.hibernate.orm.jdbc.bind=${APP_SQL_BIND_LOG_LEVEL:OFF}
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=${APP_SQL_BIND_LOG_LEVEL:OFF}

