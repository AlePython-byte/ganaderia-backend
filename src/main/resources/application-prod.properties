server.port=${PORT:10000}

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

jwt.secret=${JWT_SECRET}

app.bootstrap.admin.name=${APP_BOOTSTRAP_ADMIN_NAME:}
app.bootstrap.admin.email=${APP_BOOTSTRAP_ADMIN_EMAIL:}
app.bootstrap.admin.password=${APP_BOOTSTRAP_ADMIN_PASSWORD:}

app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:https://ganaderia3frontend.onrender.com}

management.endpoints.web.base-path=/actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true
management.endpoint.health.show-details=never

springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html