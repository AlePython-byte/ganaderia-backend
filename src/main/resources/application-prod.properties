server.port=${PORT:10000}

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

jwt.secret=${JWT_SECRET}

app.bootstrap.admin.name=${APP_BOOTSTRAP_ADMIN_NAME:}
app.bootstrap.admin.email=${APP_BOOTSTRAP_ADMIN_EMAIL:}
app.bootstrap.admin.password=${APP_BOOTSTRAP_ADMIN_PASSWORD:}

app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:https://ganaderia3frontend.onrender.com}