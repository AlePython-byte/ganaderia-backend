name: Backend CI

on:
  push:
    branches:
      - develop
      - feat/**
      - fix/**
  pull_request:
    branches:
      - develop
      - main

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Make Maven wrapper executable
        run: chmod +x mvnw

      - name: Show Java version
        run: java -version

      - name: Show Docker version
        run: docker --version

      - name: Run clean test
        run: ./mvnw clean test

  docker-build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: build-and-test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t ganaderia4backend:${{ github.sha }} .