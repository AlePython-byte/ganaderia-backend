name: Backend CI

on:
  push:
    branches:
      - develop
      - feat/**
      - fix/**
  pull_request:
    branches:
      - develop
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Make Maven wrapper executable
        run: chmod +x mvnw

      - name: Show Java version
        run: java -version

      - name: Run unit tests
        run: ./mvnw clean test

  integration-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: build-and-test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Make Maven wrapper executable
        run: chmod +x mvnw

      - name: Show Docker version
        run: docker --version

      - name: Run integration tests
        run: ./mvnw verify

  docker-build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs:
      - build-and-test
      - integration-tests

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t ganaderia4backend:${{ github.sha }} .

  deploy-render:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs:
      - build-and-test
      - docker-build
    if: github.ref == 'refs/heads/develop'

    steps:
      - name: Trigger Render deploy hook
        run: curl -fsS -X POST "$RENDER_DEPLOY_HOOK_URL"
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
