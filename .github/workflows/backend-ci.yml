name: Backend CI

on:
  push:
    branches:
      - develop
      - feat/**
      - fix/**
  pull_request:
    branches:
      - develop
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Make Maven wrapper executable
        run: chmod +x mvnw

      - name: Show Java version
        run: java -version

      - name: Show Docker version
        run: docker --version

      - name: Run Maven quality gates
        run: ./mvnw clean verify

      - name: Upload JaCoCo reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: jacoco-reports
          path: |
            target/site/jacoco
            target/site/jacoco-unit
            target/site/jacoco-integration
          if-no-files-found: warn

      - name: Upload SpotBugs reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: spotbugs-reports
          path: |
            target/site/spotbugs
            target/spotbugs
          if-no-files-found: warn

  docker-build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: build-and-test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t ganaderia4backend:${{ github.sha }} .

  deploy-render:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: docker-build
    if: github.ref == 'refs/heads/develop'

    steps:
      - name: Trigger Render deploy hook
        run: curl -fsS -X POST "$RENDER_DEPLOY_HOOK_URL"
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
