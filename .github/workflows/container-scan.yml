name: Container Scan

on:
  workflow_dispatch:
  schedule:
    - cron: "0 7 * * 1"

permissions:
  contents: read

jobs:
  trivy-container-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Build Docker image for scanning
        run: docker build -t ganaderia-backend:scan .

      - name: Generate Trivy image report
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: "ganaderia-backend:scan"
          format: "json"
          output: "trivy-image-report.json"
          exit-code: "0"
          severity: "HIGH,CRITICAL"
          vuln-type: "os,library"
          scanners: "vuln,secret"
          ignore-unfixed: true

      - name: Generate Trivy Dockerfile misconfiguration report
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: "config"
          scan-ref: "."
          format: "json"
          output: "trivy-config-report.json"
          exit-code: "0"
          severity: "HIGH,CRITICAL"
          scanners: "misconfig,secret"
          hide-progress: true
          skip-setup-trivy: true

      - name: Enforce CRITICAL vulnerability policy on image
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: "ganaderia-backend:scan"
          format: "table"
          output: "trivy-image-summary.txt"
          exit-code: "1"
          severity: "CRITICAL"
          vuln-type: "os,library"
          scanners: "vuln"
          ignore-unfixed: true
          hide-progress: true
          skip-setup-trivy: true

      - name: Upload Trivy reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-container-scan-reports
          path: |
            trivy-image-report.json
            trivy-config-report.json
            trivy-image-summary.txt
          if-no-files-found: warn
